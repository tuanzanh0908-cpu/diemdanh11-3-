<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin tài khoản</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: white; display: flex; flex-direction: column; align-items: center; }
        .header { background: #5e43f3; padding: 15px; text-align: center; font-size: 20px; width: 100%; box-sizing: border-box; font-weight: bold; }
        .container { width: 95%; max-width: 450px; margin-top: 30px; padding-bottom: 50px; }
        
        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { margin: 0 0 20px 0; color: #a29bfe; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        
        /* Phần thông tin cá nhân */
        .profile-info { display: flex; flex-direction: column; gap: 15px; }
        .info-row { display: flex; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .info-label { color: #888; font-size: 14px; }
        .info-value { color: #fff; font-weight: 500; }

        /* Phần đổi mật khẩu */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 10px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #5e43f3; background: #2a2a2a; }
        
        .btn-save { width: 100%; padding: 14px; background: #5e43f3; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { background: #6c5ce7; transform: translateY(-2px); }
        
        .message { font-size: 13px; margin-top: 15px; text-align: center; padding: 10px; border-radius: 8px; display: none; }
        .btn-back { display: block; text-align: center; margin-top: 10px; color: #888; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .btn-back:hover { color: #5e43f3; }

        .avatar-section { text-align: center; margin-bottom: 20px; }
        .avatar-img { width: 80px; height: 80px; background: #5e43f3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="header">👤 Hồ sơ cá nhân</div>

<div class="container">
    <div class="card">
        <div class="avatar-section">
            <div class="avatar-img">👨‍🏫</div>
            <h2 style="margin: 10px 0 5px 0; font-size: 20px;">Quản trị viên</h2>
        </div>
        <h3>📝 Thông tin tài khoản</h3>
        <div class="profile-info">
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="info-value" id="display-email">Đang tải...</span>
            </div>
            <div class="info-row">
                <span class="info-label">Vai trò:</span>
                <span class="info-value">Giáo viên</span>
            </div>
            <div class="info-row">
                <span class="info-label">Trạng thái:</span>
                <span class="info-value" style="color: #00ff88;">Đang hoạt động</span>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>🔒 Bảo mật & Đổi mật khẩu</h3>
        
        <div class="input-group">
            <label>Mật khẩu hiện tại</label>
            <input type="password" id="old-password" placeholder="Nhập mật khẩu cũ để xác thực">
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="input-group">
            <label>Mật khẩu mới</label>
            <input type="password" id="new-password" placeholder="Tối thiểu 6 ký tự">
        </div>
        <div class="input-group">
            <label>Xác nhận mật khẩu mới</label>
            <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu mới">
        </div>

        <button class="btn-save" id="btn-update">Cập nhật mật khẩu</button>
        <div id="msg" class="message"></div>
    </div>

    <a href="home.html" class="btn-back">⬅ Quay lại trang chủ</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, EmailAuthProvider, reauthenticateWithCredential, updatePassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // --- Cấu hình Firebase của bạn ---
    const firebaseConfig = {
        apiKey: "AIzaSyDlX-enfqdnmhvh84uoaxcp7u07_6cwbQA", 
        authDomain: "diemdanh-d4deb.firebaseapp.com",
        projectId: "diemdanh-d4deb",
        databaseURL: "https://diemdanh-d4deb-default-rtdb.asia-southeast1.firebasedatabase.app",
        appId: "1:884475205099:web:0bb2b6b14d323972cf75ae"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Hiển thị Email khi tải trang
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('display-email').innerText = user.email;
        } else {
            window.location.href = "index.html"; 
        }
    });

    // Xử lý đổi mật khẩu
    document.getElementById('btn-update').addEventListener('click', async () => {
        const oldPass = document.getElementById('old-password').value;
        const newPass = document.getElementById('new-password').value;
        const confirmPass = document.getElementById('confirm-password').value;
        const msg = document.getElementById('msg');

        msg.style.display = "block";
        msg.style.background = "#332222";
        msg.style.color = "#ff4757";

        if (!oldPass || !newPass || !confirmPass) {
            msg.innerText = "Vui lòng nhập đầy đủ các ô!";
            return;
        }
        if (newPass.length < 6) {
            msg.innerText = "Mật khẩu mới phải từ 6 ký tự!";
            return;
        }
        if (newPass !== confirmPass) {
            msg.innerText = "Mật khẩu xác nhận không khớp!";
            return;
        }

        const user = auth.currentUser;
        const credential = EmailAuthProvider.credential(user.email, oldPass);

        try {
            await reauthenticateWithCredential(user, credential);
            await updatePassword(user, newPass);
            
            msg.style.background = "#1a3322";
            msg.style.color = "#00ff88";
            msg.innerText = "✅ Đổi mật khẩu thành công!";
            document.querySelectorAll('input').forEach(i => i.value = "");
        } catch (error) {
            if (error.code === 'auth/wrong-password') {
                msg.innerText = "❌ Mật khẩu cũ không chính xác!";
            } else {
                msg.innerText = "Lỗi: " + error.message;
            }
        }
    });
</script>

</body>
</html>
