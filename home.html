<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang chính</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #111;
        color: white;
    }

    .header {
        background: #5e43f3;
        padding: 15px;
        text-align: center;
        font-size: 20px;
    }

    .menu {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 80px;
    }

    .card {
        width: 250px;
        margin: 15px;
        padding: 20px;
        background: #1a1a1a;
        border-radius: 15px;
        text-align: center;
        transition: 0.3s;
        cursor: pointer;
    }

    .card:hover {
        transform: scale(1.05);
        background: #5e43f3;
    }

    a {
        text-decoration: none;
        color: white;
    }
</style>
</head>

<body>

<div class="header">
    Trang chính 👋
</div>

<div class="menu">

        <div class="card">📚 Chọn lớp</div>
    </a>

    </a>

    <a href="logout.html">

    </a>

</div>

</body>
</html>
