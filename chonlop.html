<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - RFID System</title>
    <style>
        :root { --primary-purple: #5e43f3; --light-purple: #a29bfe; --dark-bg: #111; --card-bg: #1a1a1a; --text-gray: #888; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--dark-bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .top-bar { width: 100%; display: flex; align-items: center; padding: 15px 30px; background: #1a1a1a; border-bottom: 1px solid #333; box-sizing: border-box; position: sticky; top: 0; z-index: 100; }
        .btn-back-home { text-decoration: none; color: var(--light-purple); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .dashboard { width: 95%; max-width: 1000px; margin-top: 30px; padding-bottom: 50px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #333; margin-bottom: 25px; }
        h3 { margin-top: 0; color: var(--light-purple); display: flex; align-items: center; gap: 10px; font-size: 18px; }
        .class-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .class-item { background: #252525; border: 1px solid #444; padding: 8px 18px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .class-item:hover { background: var(--primary-purple); color: white; }
        .input-group { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; background: #222; border: 1px solid #444; border-radius: 12px; color: white; outline: none; }
        .btn-main { background: var(--primary-purple); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 2px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .badge { padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .bg-present { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .bg-absent { background: rgba(255, 71, 87, 0.1); color: #ff4757; }
        .btn-delete { background: transparent; color: #ff4757; border: 1px solid #ff4757; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="home.html" class="btn-back-home">⬅ Quay lại trang chính</a>
</div>

<div class="dashboard">
    <div class="card">
        <h3>🏫 Truy cập lớp học</h3>
        <div class="input-group">
            <input type="text" id="classInput" placeholder="Nhập tên lớp (VD: 12A1)">
            <button class="btn-main" id="btnSelect">Truy Cập</button>
        </div>
        <div style="margin-top: 20px;">
            <p style="font-size: 13px; color: var(--text-gray);">Lớp đã tạo:</p>
            <div id="available-classes" class="class-list"></div>
        </div>
    </div>

    <div id="main-management" style="display: none;">
        <div class="card">
            <h3>👤 Thêm Học Sinh - Lớp <span id="label-class" style="color: var(--light-purple); margin-left: 5px;"></span></h3>
            <div class="input-group">
                <input type="text" id="stuName" placeholder="Họ và tên">
                <input type="text" id="cardId" placeholder="Mã thẻ RFID">
                <button class="btn-main" id="btnAddStu">+ Thêm</button>
            </div>
        </div>

        <div class="card">
            <h3>📋 Điểm Danh Realtime (<span id="current-date"></span>)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Mã Thẻ</th>
                        <th>Họ Tên</th>
                        <th>Trạng Thái</th>
                        <th>Giờ Đến</th>
                        <th>Xóa</th>
                    </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // CONFIG CHUẨN CỦA BẠN
    const firebaseConfig = {
        apiKey: "AIzaSyDlX-enfqdnmhvh84uoaxcp7u07_6cwbQA",
        authDomain: "diemdanh-d4deb.firebaseapp.com",
        databaseURL: "https://diemdanh-d4deb-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "diemdanh-d4deb",
        storageBucket: "diemdanh-d4deb.firebasestorage.app",
        messagingSenderId: "884475205099",
        appId: "1:884475205099:web:0bb2b6b14d323972cf75ae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentClass = "";
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN');

    // Tải danh sách lớp
    onValue(ref(db, 'LopHoc'), (snapshot) => {
        const container = document.getElementById('available-classes');
        container.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(name => {
                const span = document.createElement('span');
                span.className = 'class-item';
                span.innerText = name;
                span.onclick = () => { document.getElementById('classInput').value = name; selectClass(); };
                container.appendChild(span);
            });
        }
    });

    // Hàm chọn lớp
    function selectClass() {
        const val = document.getElementById('classInput').value.trim().toUpperCase();
        if(!val) return alert("Chưa nhập tên lớp!");
        currentClass = val;
        document.getElementById('label-class').innerText = currentClass;
        document.getElementById('main-management').style.display = 'block';
        loadData();
    }
    document.getElementById('btnSelect').onclick = selectClass;

    // Tải dữ liệu học sinh
    function loadData() {
        onValue(ref(db, `LopHoc/${currentClass}/DanhSachHocSinh`), (snapshot) => {
            const students = snapshot.val() || {};
            onValue(ref(db, `LopHoc/${currentClass}/DiemDanh/${today}`), (attSnapshot) => {
                const attendance = attSnapshot.val() || {};
                renderUI(students, attendance);
            });
        });
    }

    function renderUI(students, attendance) {
        const tbody = document.getElementById('studentTable');
        tbody.innerHTML = "";
        for (let id in students) {
            const isPresent = attendance[id];
            tbody.innerHTML += `
                <tr>
                    <td><code>${id}</code></td>
                    <td>${students[id].HoTen}</td>
                    <td><span class="badge ${isPresent ? 'bg-present' : 'bg-absent'}">${isPresent ? 'CÓ MẶT' : 'VẮNG'}</span></td>
                    <td>${isPresent ? attendance[id] : "--:--"}</td>
                    <td><button class="btn-delete" onclick="window.delStu('${id}')">Xóa</button></td>
                </tr>`;
        }
    }

    document.getElementById('btnAddStu').onclick = function() {
        const name = document.getElementById('stuName').value.trim();
        const id = document.getElementById('cardId').value.trim();
        if(name && id) set(ref(db, `LopHoc/${currentClass}/DanhSachHocSinh/${id}`), { HoTen: name });
    };

    window.delStu = (id) => { if(confirm("Xóa học sinh?")) remove(ref(db, `LopHoc/${currentClass}/DanhSachHocSinh/${id}`)); };
</script>
</body>
</html>
