<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Lớp Học - RFID System</title>
    <style>
        :root { --primary-purple: #5e43f3; --light-purple: #a29bfe; --dark-bg: #111; --card-bg: #1a1a1a; --text-gray: #888; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--dark-bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .top-bar { width: 100%; display: flex; align-items: center; padding: 15px 30px; background: #1a1a1a; border-bottom: 1px solid #333; box-sizing: border-box; position: sticky; top: 0; z-index: 100; }
        .btn-back-home { text-decoration: none; color: var(--light-purple); font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .dashboard { width: 95%; max-width: 1000px; margin-top: 30px; padding-bottom: 50px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid #333; margin-bottom: 25px; }
        h3 { margin-top: 0; color: var(--light-purple); display: flex; align-items: center; gap: 10px; font-size: 18px; }
        
        .class-list { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 15px; }
        .class-badge-wrapper { display: flex; align-items: center; background: #252525; border: 1px solid #444; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .class-badge-wrapper:hover { border-color: var(--light-purple); transform: translateY(-2px); }
        .class-name-btn { padding: 8px 15px; cursor: pointer; font-weight: bold; color: #ccc; border: none; background: transparent; }
        .class-name-btn:hover { color: white; background: rgba(94, 67, 243, 0.2); }
        .btn-del-class { background: #331111; color: #ff4757; border: none; padding: 8px 10px; cursor: pointer; font-size: 14px; border-left: 1px solid #444; }
        .btn-del-class:hover { background: #ff4757; color: white; }

        .input-group { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; background: #222; border: 1px solid #444; border-radius: 12px; color: white; outline: none; }
        .btn-main { background: var(--primary-purple); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* CSS cho nút Reset */
        .btn-reset { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; }
        .btn-reset:hover { background: #ff4757; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 15px; color: var(--text-gray); border-bottom: 2px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .badge { padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .bg-present { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .bg-absent { background: rgba(255, 71, 87, 0.1); color: #ff4757; }
        .btn-delete { background: transparent; color: #ff4757; border: 1px solid #ff4757; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="home.html" class="btn-back-home">⬅ Quay lại trang chính</a>
</div>

<div class="dashboard">
    <div class="card">
        <h3>🏫 Truy cập lớp học</h3>
        <div class="input-group">
            <input type="text" id="classInput" placeholder="Nhập tên lớp mới (VD: 11A2)">
            <button class="btn-main" id="btnSelect">Truy Cập / Tạo</button>
        </div>
        <div style="margin-top: 25px;">
            <p style="font-size: 13px; color: var(--text-gray); margin-bottom: 10px;">Lớp đã tạo (Bấm vào tên để chọn, ✖ để xóa):</p>
            <div id="available-classes" class="class-list"></div>
        </div>
    </div>

    <div id="main-management" style="display: none;">
        <div class="card">
            <h3>👤 Quản lý học sinh - Lớp <span id="label-class" style="color: var(--light-purple); font-weight: bold;"></span></h3>
            <div class="input-group">
                <input type="text" id="stuName" placeholder="Họ và tên">
                <input type="text" id="cardId" placeholder="Mã thẻ RFID">
                <button class="btn-main" id="btnAddStu">+ Thêm</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <h3 style="margin: 0;">📋 Danh sách điểm danh (<span id="current-date"></span>)</h3>
                <button class="btn-reset" id="btnReset">🔄 Reset hôm nay</button>
            </div>
            
            <div style="overflow-x: auto; margin-top: 15px;">
                <table>
                    <thead>
                        <tr>
                            <th>Mã Thẻ</th>
                            <th>Họ Tên</th>
                            <th>Trạng Thái</th>
                            <th>Giờ Đến</th>
                            <th>Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDlX-enfqdnmhvh84uoaxcp7u07_6cwbQA",
        authDomain: "diemdanh-d4deb.firebaseapp.com",
        databaseURL: "https://diemdanh-d4deb-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "diemdanh-d4deb",
        storageBucket: "diemdanh-d4deb.firebasestorage.app",
        messagingSenderId: "884475205099",
        appId: "1:884475205099:web:0bb2b6b14d323972cf75ae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentClass = "";
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN');

    // 1. Tải danh sách lớp kèm nút xóa
    onValue(ref(db, 'LopHoc'), (snapshot) => {
        const container = document.getElementById('available-classes');
        container.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(name => {
                const wrapper = document.createElement('div');
                wrapper.className = 'class-badge-wrapper';
                wrapper.innerHTML = `
                    <button class="class-name-btn">${name}</button>
                    <button class="btn-del-class" title="Xóa lớp">✖</button>
                `;
                
                wrapper.querySelector('.class-name-btn').onclick = () => {
                    document.getElementById('classInput').value = name;
                    selectClass();
                };

                wrapper.querySelector('.btn-del-class').onclick = (e) => {
                    e.stopPropagation(); 
                    if(confirm(`CẢNH BÁO: Bạn có chắc chắn muốn xóa toàn bộ lớp ${name}? Dữ liệu học sinh và điểm danh sẽ mất hết.`)) {
                        remove(ref(db, `LopHoc/${name}`));
                        if(currentClass === name) {
                            document.getElementById('main-management').style.display = 'none';
                            currentClass = "";
                        }
                    }
                };
                container.appendChild(wrapper);
            });
        }
    });

    // 2. Hàm chọn lớp
    function selectClass() {
        const val = document.getElementById('classInput').value.trim().toUpperCase();
        if(!val) return alert("Vui lòng nhập hoặc chọn lớp!");
        currentClass = val;
        document.getElementById('label-class').innerText = currentClass;
        document.getElementById('main-management').style.display = 'block';
        loadData();
    }
    document.getElementById('btnSelect').onclick = selectClass;

    // 3. Tải dữ liệu học sinh & điểm danh
    function loadData() {
        onValue(ref(db, `LopHoc/${currentClass}/DanhSachHocSinh`), (snapshot) => {
            const students = snapshot.val() || {};
            // Lắng nghe nhánh điểm danh của ngày hôm nay
            onValue(ref(db, `LopHoc/${currentClass}/DiemDanh/${today}`), (attSnapshot) => {
                const attendance = attSnapshot.val() || {};
                renderUI(students, attendance);
            });
        });
    }

    function renderUI(students, attendance) {
        const tbody = document.getElementById('studentTable');
        tbody.innerHTML = "";
        for (let id in students) {
            const isPresent = attendance[id];
            tbody.innerHTML += `
                <tr>
                    <td><code>${id}</code></td>
                    <td>${students[id].HoTen}</td>
                    <td><span class="badge ${isPresent ? 'bg-present' : 'bg-absent'}">${isPresent ? 'ĐÃ ĐẾN' : 'VẮNG'}</span></td>
                    <td>${isPresent ? attendance[id] : "--:--"}</td>
                    <td><button class="btn-delete" onclick="window.delStu('${id}')">Xóa</button></td>
                </tr>`;
        }
    }

    // 4. Nút Thêm học sinh
    document.getElementById('btnAddStu').onclick = function() {
        const name = document.getElementById('stuName').value.trim();
        const id = document.getElementById('cardId').value.trim();
        if(name && id) {
            set(ref(db, `LopHoc/${currentClass}/DanhSachHocSinh/${id}`), { HoTen: name });
            document.getElementById('stuName').value = "";
            document.getElementById('cardId').value = "";
        } else {
            alert("Vui lòng nhập đủ Tên và Mã thẻ!");
        }
    };

    // 5. Hàm Reset điểm danh (Phần bạn yêu cầu)
    document.getElementById('btnReset').onclick = function() {
        if(!currentClass) return;
        
        const confirmReset = confirm(`Bạn có chắc chắn muốn RESET toàn bộ điểm danh ngày hôm nay của lớp ${currentClass} không?\nTất cả học sinh sẽ trở về trạng thái VẮNG.`);
        
        if(confirmReset) {
            // Xóa nhánh dữ liệu điểm danh của ngày hôm nay trên Firebase
            const attendanceRef = ref(db, `LopHoc/${currentClass}/DiemDanh/${today}`);
            remove(attendanceRef)
                .then(() => {
                    alert("Đã reset danh sách thành công!");
                })
                .catch((error) => {
                    console.error("Lỗi khi reset:", error);
                    alert("Có lỗi xảy ra khi xóa dữ liệu.");
                });
        }
    };

    window.delStu = (id) => { 
        if(confirm("Xóa học sinh này khỏi lớp?")) remove(ref(db, `LopHoc/${currentClass}/DanhSachHocSinh/${id}`)); 
    };
</script>
</body>
</html>
