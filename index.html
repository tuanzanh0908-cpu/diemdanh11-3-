<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and signUp @ilmah960</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #5e43f3;
            --bg: #eae5e5;
            --card: #1a1a1a;
            --input: #252525;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--card);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            width: 800px;
            max-width: 100%;
            min-height: 500px;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }

        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .container.active .sign-in-container {
            transform: translateX(100%);
            opacity: 0;
        }

        .container.active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        form {
            background-color: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            height: 100%;
            text-align: center;
        }

        h1 { color: var(--text); margin-bottom: 15px; }

        .social-container { margin: 15px 0; }
        .social-container a {
            border: 1px solid #333;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px;
            height: 35px;
            width: 35px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        input {
            background-color: var(--input);
            border: none;
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .main-btn {
            border-radius: 50px;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.1s ease;
        }

        .main-btn:active { transform: scale(0.95); }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .container.active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            background: var(--primary);
            color: #FFFFFF;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .container.active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .container.active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .container.active .overlay-right {
            transform: translateX(20%);
        }

        .ghost-btn {
            background-color: transparent;
            border: 1px solid white;
            border-radius: 50px;
            color: white;
            padding: 10px 40px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
        }

        p { font-size: 14px; margin: 20px 0; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="signUpForm">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <input type="text" placeholder="Full Name" />
                <input type="email" id="regEmail" placeholder="Email" required />
                <input type="password" id="regPass" placeholder="Password" required />
                <button type="submit" class="main-btn">Sign Up</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form id="signInForm">
                <h1>Sign In</h1>
                <div class="social-container">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <input type="email" id="loginEmail" placeholder="Email" required />
                <input type="password" id="loginPass" placeholder="Password" required />
                <button type="submit" class="main-btn">Login</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost-btn" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Welcome back</h1>
                    <p>Login to review your latest profit from investments.</p>
                    <button class="ghost-btn" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Import các hàm cần thiết từ Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 2. Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDlX-enfqdnmhvh84uoaxcp7u07_6cwbQA",
            authDomain: "diemdanh-d4deb.firebaseapp.com",
            projectId: "diemdanh-d4deb",
            storageBucket: "diemdanh-d4deb.firebasestorage.app",
            messagingSenderId: "884475205099",
            appId: "1:884475205099:web:3146096e53f1256fcf75ae",
            measurementId: "G-6GR6G76LX8"
        };

        // 3. Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 4. Các hiệu ứng chuyển đổi giao diện
        const signUpBtn = document.getElementById('signUp');
        const signInBtn = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpBtn.addEventListener('click', () => container.classList.add("active"));
        signInBtn.addEventListener('click', () => container.classList.remove("active"));

        // 5. Xử lý ĐĂNG KÝ (Sign Up)
        const signUpForm = document.getElementById('signUpForm');
        signUpForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;

            createUserWithEmailAndPassword(auth, email, pass)
                .then((userCredential) => {
                    alert("Đăng ký thành công tài khoản: " + email);
                    container.classList.remove("active"); // Chuyển sang khung Login
                })
                .catch((error) => {
                    alert("Lỗi đăng ký: " + error.message);
                });
        });

        // 6. Xử lý ĐĂNG NHẬP (Sign In)
        const signInForm = document.getElementById('signInForm');
        signInForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            signInWithEmailAndPassword(auth, email, pass)
                .then((userCredential) => {
                    alert("Đăng nhập thành công!");
                    window.location.href = "home.html"; // Chuyển trang
                })
                .catch((error) => {
                    alert("Sai tài khoản hoặc mật khẩu!");
                });
        });
    </script>
</body>
</html>
